events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Редирект HTTP → HTTPS
    server {
        listen 80;
        server_name app.e-budget.ru;
        return 301 https://$host$request_uri;
    }

    # HTTPS сервер
    server {
        listen 443 ssl;
        server_name app.e-budget.ru;

        ssl_certificate /etc/letsencrypt/live/app.e-budget.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/app.e-budget.ru/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Виджеты (статика)
        location /widget/ {
            alias /usr/share/nginx/html/widget/;
            add_header Access-Control-Allow-Origin *;
            add_header Cache-Control "public, max-age=3600";
        }

        # API
        location /api/ {
            proxy_pass http://api:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization";

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # Health check
        location /health {
            proxy_pass http://api:3000/health;
        }

        # NocoDB (опционально, для доступа через браузер)
        location /nocodb/ {
            proxy_pass http://nocodb:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # NocoDB статические файлы (_nuxt, manifest и т.д.)
        location ~ ^/(\_nuxt|manifest\.webmanifest|favicon\.ico) {
            proxy_pass http://nocodb:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
        }
    }
}
