events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Логирование
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Оптимизация
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip сжатие
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

    # Upstream для API
    upstream api_backend {
        server api:3000;
    }

    # Основной сервер
    server {
        listen 80;
        server_name localhost;

        # Максимальный размер загружаемых файлов
        client_max_body_size 10M;

        # Статика виджетов
        location /widget/ {
            alias /usr/share/nginx/html/widget/;
            expires 1h;
            add_header Cache-Control "public, immutable";
            
            # CORS для виджетов
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type";
        }

        # API проксирование
        location /api/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # Таймауты
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Health check
        location /health {
            proxy_pass http://api_backend/health;
        }

        # Главная страница (опционально)
        location / {
            return 200 '{"status":"ok","service":"E-Budget API"}';
            add_header Content-Type application/json;
        }
    }

    # HTTPS конфигурация (раскомментировать после настройки SSL)
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.ru;
    #
    #     ssl_certificate /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #
    #     # Остальная конфигурация как в server блоке выше
    # }
}
